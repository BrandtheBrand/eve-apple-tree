name: Release

# Push a version tag (e.g. 0.4.1) and this workflow builds the plugin from
# source, generates GitHub artifact attestations for the release assets
# (so users and the Obsidian review bot can verify provenance), and creates
# the release with all assets attached.
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Check tag matches manifest version
        run: |
          MANIFEST_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('manifest.json','utf8')).version")
          if [ "$MANIFEST_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match manifest.json version $MANIFEST_VERSION" >&2
            exit 1
          fi

      - run: npm ci

      - run: npm run build

      - name: Build team zip
        run: bash scripts/build-team-zip.sh

      - name: Attest release assets
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            styles.css
            manifest.json
            eve-tree-team-${{ github.ref_name }}.zip

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            main.js manifest.json styles.css "eve-tree-team-$GITHUB_REF_NAME.zip" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
